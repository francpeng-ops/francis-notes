<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1300" width="760" height="1300" font-family="Noto Sans TC, sans-serif">
<defs><style>@import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=Noto+Serif+TC:wght@600;700&amp;display=swap"); text{font-family:"Noto Sans TC",sans-serif;}</style><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/></filter></defs>
<rect width="760" height="1300" fill="#F5F0E7"/>
<text x="380.0" y="74" text-anchor="middle" font-family="Noto Serif TC, serif" font-weight="700" font-size="34" fill="#23282B" letter-spacing="2">上傳到 GitHub Pages</text>
<text x="380.0" y="108" text-anchor="middle" font-size="15" fill="#216B78" letter-spacing="4">FRANCIS · NOTES　|　DEPLOY GUIDE</text>
<line x1="56" y1="134" x2="704" y2="134" stroke="#E0DACE" stroke-width="1"/>
<rect x="56" y="176" width="648" height="96" rx="12" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1" filter="url(#sh)"/><circle cx="100" cy="224.0" r="22" fill="#216B78"/><text x="100" y="231.0" text-anchor="middle" font-size="22" font-weight="700" fill="#F5F0E7">1</text><text x="142" y="214" font-size="19" font-weight="700" fill="#23282B">解壓縮 ZIP</text><text x="142" y="236" font-size="14.5" fill="#5A6166">下載並解壓 francis-notes.zip，</text><text x="142" y="257" font-size="14.5" fill="#5A6166">得到一個含 index.html 的資料夾。</text>
<line x1="100" y1="276" x2="100" y2="298" stroke="#216B78" stroke-width="2"/>
<path d="M 95 292 L 100 300 L 105 292 Z" fill="#216B78"/>
<rect x="56" y="304" width="648" height="96" rx="12" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1" filter="url(#sh)"/><circle cx="100" cy="352.0" r="22" fill="#216B78"/><text x="100" y="359.0" text-anchor="middle" font-size="22" font-weight="700" fill="#F5F0E7">2</text><text x="142" y="342" font-size="19" font-weight="700" fill="#23282B">建立 GitHub 儲存庫</text><text x="142" y="364" font-size="14.5" fill="#5A6166">github.com 註冊或登入 → New repository，</text><text x="142" y="385" font-size="14.5" fill="#5A6166">命名、選 Public → Create repository。</text>
<line x1="100" y1="404" x2="100" y2="426" stroke="#216B78" stroke-width="2"/>
<path d="M 95 420 L 100 428 L 105 420 Z" fill="#216B78"/>
<rect x="56" y="432" width="648" height="96" rx="12" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1" filter="url(#sh)"/><circle cx="100" cy="480.0" r="22" fill="#216B78"/><text x="100" y="487.0" text-anchor="middle" font-size="22" font-weight="700" fill="#F5F0E7">3</text><text x="142" y="470" font-size="19" font-weight="700" fill="#23282B">上傳檔案</text><text x="142" y="492" font-size="14.5" fill="#5A6166">Add file → Upload files，把資料夾「裡面」的</text><text x="142" y="513" font-size="14.5" fill="#5A6166">檔案全部拖入 → Commit changes。</text>
<line x1="100" y1="532" x2="100" y2="554" stroke="#216B78" stroke-width="2"/>
<path d="M 95 548 L 100 556 L 105 548 Z" fill="#216B78"/>
<rect x="56" y="560" width="648" height="96" rx="12" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1" filter="url(#sh)"/><circle cx="100" cy="608.0" r="22" fill="#216B78"/><text x="100" y="615.0" text-anchor="middle" font-size="22" font-weight="700" fill="#F5F0E7">4</text><text x="142" y="598" font-size="19" font-weight="700" fill="#23282B">開啟 GitHub Pages</text><text x="142" y="620" font-size="14.5" fill="#5A6166">Settings → Pages → Branch 選 main、</text><text x="142" y="641" font-size="14.5" fill="#5A6166">資料夾 /(root) → Save。</text>
<line x1="100" y1="660" x2="100" y2="682" stroke="#216B78" stroke-width="2"/>
<path d="M 95 676 L 100 684 L 105 676 Z" fill="#216B78"/>
<rect x="56" y="688" width="648" height="96" rx="12" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1" filter="url(#sh)"/><circle cx="100" cy="736.0" r="22" fill="#216B78"/><text x="100" y="743.0" text-anchor="middle" font-size="22" font-weight="700" fill="#F5F0E7">5</text><text x="142" y="726" font-size="19" font-weight="700" fill="#23282B">等待 1–2 分鐘</text><text x="142" y="748" font-size="14.5" fill="#5A6166">重新整理頁面，取得你的網址：</text><text x="142" y="769" font-size="14.5" fill="#5A6166">https://你的帳號.github.io/francis-notes/</text>
<line x1="100" y1="788" x2="100" y2="810" stroke="#216B78" stroke-width="2"/>
<path d="M 95 804 L 100 812 L 105 804 Z" fill="#216B78"/>
<rect x="56" y="816" width="648" height="96" rx="12" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1" filter="url(#sh)"/><circle cx="100" cy="864.0" r="22" fill="#216B78"/><text x="100" y="871.0" text-anchor="middle" font-size="22" font-weight="700" fill="#F5F0E7">6</text><text x="142" y="854" font-size="19" font-weight="700" fill="#23282B">完成，分享連結</text><text x="142" y="876" font-size="14.5" fill="#5A6166">打開網址就是目錄首頁，</text><text x="142" y="897" font-size="14.5" fill="#5A6166">這個連結傳給任何人都能看。</text>
<rect x="56" y="950" width="648" height="92" rx="10" fill="#E9F0F1" stroke="#216B78" stroke-width="1"/>
<rect x="56" y="950" width="6" height="92" rx="3" fill="#216B78"/>
<circle cx="90" cy="980" r="13" fill="#216B78"/>
<text x="90" y="986" text-anchor="middle" font-size="17" font-weight="700" fill="#F5F0E7">!</text>
<text x="114" y="978" font-size="16" font-weight="700" fill="#23282B">最容易出錯的一步</text>
<text x="114" y="1002" font-size="14" fill="#5A6166">要上傳資料夾「裡面的檔案」，讓 index.html 在 repo 最上層（根目錄）。</text>
<text x="114" y="1023" font-size="14" fill="#5A6166">別把 francis-notes 整個資料夾丟進去，否則網址會多一層、打不開。</text>
<text x="56" y="1078" font-family="Noto Serif TC, serif" font-size="20" font-weight="700" fill="#23282B">之後發新文章：每週 3 步</text>
<rect x="56.0" y="1096" width="205.33333333333334" height="78" rx="10" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1"/>
<circle cx="80.0" cy="1120" r="13" fill="#C9A24A"/>
<text x="80.0" y="1125" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">A</text>
<text x="100.0" y="1118" font-size="12.5" fill="#5A6166">複製 _template</text>
<text x="100.0" y="1135" font-size="12.5" fill="#5A6166">.html，改英文檔名、</text>
<text x="100.0" y="1152" font-size="12.5" fill="#5A6166">填內容</text>
<text x="265.33333333333337" y="1140.0" font-size="16" fill="#216B78">→</text>
<rect x="277.33333333333337" y="1096" width="205.33333333333334" height="78" rx="10" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1"/>
<circle cx="301.33333333333337" cy="1120" r="13" fill="#C9A24A"/>
<text x="301.33333333333337" y="1125" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">B</text>
<text x="321.33333333333337" y="1118" font-size="12.5" fill="#5A6166">在 index.html</text>
<text x="321.33333333333337" y="1135" font-size="12.5" fill="#5A6166"> 複製一個 &lt;li&gt; 區</text>
<text x="321.33333333333337" y="1152" font-size="12.5" fill="#5A6166">塊，改連結、標題、日期</text>
<text x="486.66666666666674" y="1140.0" font-size="16" fill="#216B78">→</text>
<rect x="498.6666666666667" y="1096" width="205.33333333333334" height="78" rx="10" fill="#FFFFFF" stroke="#E0DACE" stroke-width="1"/>
<circle cx="522.6666666666667" cy="1120" r="13" fill="#C9A24A"/>
<text x="522.6666666666667" y="1125" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">C</text>
<text x="542.6666666666667" y="1118" font-size="12.5" fill="#5A6166">上傳這兩個檔 → Com</text>
<text x="542.6666666666667" y="1135" font-size="12.5" fill="#5A6166">mit，網站約 1 分鐘</text>
<text x="542.6666666666667" y="1152" font-size="12.5" fill="#5A6166">後自動更新</text>
<line x1="56" y1="1196" x2="704" y2="1196" stroke="#E0DACE" stroke-width="1"/>
<text x="380.0" y="1218" text-anchor="middle" font-size="12.5" fill="#9AA0A2" letter-spacing="2">法蘭西斯的學習筆記 · 上傳教學圖解</text>
</svg>