<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ★ 只改這行：瀏覽器分頁標題 -->
<title>文章標題｜知識解碼</title>
<!-- ★ 改成這篇的英文檔名（francpeng-ops 上線時統一取代） -->
<link rel="canonical" href="https://francpeng-ops.github.io/francis-notes/CHANGE-ME.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     知識解碼 — 共用版型（這整段 <style> 不用動）
     可調的只有 --accent 等少數變數，想換色再改
     ============================================================ */
  :root{
    --paper:#F5F0E7;
    --ink:#23282B;
    --ink-soft:#4E575B;
    --faint:#8C969A;
    --accent:#216B78;          /* 知識系列：墨綠藍 */
    --accent-soft:#2C8190;
    --hair:rgba(35,40,43,0.12);
    --serif:"Noto Serif TC",serif;
    --sans:"Noto Sans TC",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--sans); font-weight:400; line-height:2.0;
    letter-spacing:0.02em; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .wrap{ max-width:39rem; margin:0 auto; padding:0 1.5rem 5rem; opacity:0; animation:rise 0.9s ease-out 0.05s forwards; }
  @keyframes rise{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
  @media (prefers-reduced-motion:reduce){ .wrap{animation:none;opacity:1;} }

  .hero{ padding:5rem 0 2.75rem; text-align:center; }
  .hero .kicker{ font-weight:500; font-size:0.74rem; letter-spacing:0.26em; color:var(--accent); margin:0 0 1.7rem; }
  .hero h1{ font-family:var(--serif); font-weight:700; font-size:2.0rem; line-height:1.5; letter-spacing:0.03em; margin:0 0 1.1rem; }
  .hero .sub{ font-size:0.92rem; color:var(--ink-soft); letter-spacing:0.06em; font-weight:300; line-height:1.85; margin:0; }

  .tldr{ margin:2.5rem 0 0; padding:1.4rem 1.5rem 1.5rem; background:rgba(33,107,120,0.06); border:1px solid rgba(33,107,120,0.18); border-left:4px solid var(--accent); border-radius:4px; }
  .tldr .label{ font-family:var(--mono); font-size:0.66rem; letter-spacing:0.24em; color:var(--accent); margin:0 0 0.7rem; }
  .tldr p{ font-size:0.99rem; line-height:1.95; margin:0; color:var(--ink); }

  section{ margin-top:3.5rem; }
  h2{ font-family:var(--serif); font-weight:600; font-size:1.3rem; line-height:1.6; letter-spacing:0.03em; margin:0 0 1.25rem; padding-bottom:0.5rem; border-bottom:1px solid var(--hair); }
  h3{ font-family:var(--sans); font-weight:500; font-size:1.02rem; letter-spacing:0.04em; color:var(--accent); margin:1.6rem 0 0.4rem; }
  p{ font-size:1.0625rem; margin:0 0 1.4em; color:var(--ink); }
  p:last-child{ margin-bottom:0; }

  .en{ font-family:var(--serif); font-style:italic; letter-spacing:0.01em; }
  .strong{ font-weight:500; color:var(--ink); }
  .hl{ font-style:normal; font-weight:500; color:var(--ink); background:linear-gradient(transparent 62%, rgba(33,107,120,0.16) 62%); }

  .framework{ margin:1.6rem 0 1.5rem; overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:0.96rem; line-height:1.7; }
  thead th{ background:var(--accent); color:#F5F0E7; font-weight:500; text-align:left; padding:0.55rem 0.85rem; letter-spacing:0.04em; }
  tbody td{ padding:0.6rem 0.85rem; border-bottom:1px solid var(--hair); vertical-align:top; }
  tbody td:first-child{ font-weight:600; white-space:nowrap; color:var(--ink); }
  tbody tr:nth-child(even){ background:rgba(33,107,120,0.045); }

  .pull{ margin:2.5rem 0; padding:0 0 0 1.2rem; border-left:3px solid var(--accent-soft); }
  .pull p{ font-family:var(--serif); font-weight:500; font-size:1.24rem; line-height:1.8; letter-spacing:0.02em; color:var(--ink); margin:0; }

  .closing{ position:relative; margin-top:4.5rem; padding:5rem 1rem; text-align:center; overflow:hidden; }
  .closing::before{ content:""; position:absolute; left:50%; top:46%; width:min(120%,30rem); height:30rem; transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(168,206,212,0.80) 0%, rgba(168,206,212,0.30) 32%, rgba(245,240,231,0) 68%); z-index:0; }
  .closing .grace{ position:relative; z-index:1; font-family:var(--serif); font-weight:600; font-size:1.6rem; line-height:1.7; letter-spacing:0.08em; margin:0; }
  .closing .grace .small{ display:block; font-family:var(--mono); font-size:0.66rem; letter-spacing:0.26em; color:var(--accent); margin-bottom:1.3rem; font-weight:400; }

  .foot{ margin-top:3rem; text-align:center; color:var(--faint); font-size:0.76rem; letter-spacing:0.1em; line-height:1.9; }
  .foot .dot{ width:4px; height:4px; border-radius:50%; background:var(--accent); opacity:0.7; margin:0 auto 1.3rem; }
  .foot a{ color:var(--accent); text-decoration:none; }

  @media (max-width:430px){
    .hero{ padding:3.75rem 0 2.25rem; } .hero h1{ font-size:1.7rem; }
    .pull p{ font-size:1.14rem; } .closing .grace{ font-size:1.42rem; } .closing{ padding:4rem 0.5rem; }
    table{ font-size:0.9rem; } thead th, tbody td{ padding:0.5rem 0.6rem; }
  }

  /* ---------- top nav + pager (auto-added) ---------- */
  .topnav{ padding-top:1.6rem; }
  .topnav a{ font-family:var(--mono); font-size:0.72rem; letter-spacing:0.16em; color:var(--accent); text-decoration:none; }
  .topnav a:hover{ opacity:0.65; }
  .topnav + .hero{ padding-top:2.5rem; }
  .pager{ display:flex; justify-content:space-between; gap:1.2rem; margin-top:4rem; padding-top:1.6rem; border-top:1px solid var(--hair); }
  .pager a{ text-decoration:none; color:var(--accent); max-width:48%; }
  .pager .next{ text-align:right; margin-left:auto; }
  .pager .dir{ font-family:var(--mono); font-size:0.66rem; letter-spacing:0.14em; }
  .pager .pt{ display:block; font-family:var(--serif); font-weight:500; font-size:0.95rem; line-height:1.45; color:var(--ink-soft); margin-top:0.35rem; }
  .pager a:hover .pt{ color:var(--ink); }

  :root{ color-scheme: light dark; }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#1A1712; --ink:#ECE6D9; --ink-soft:#B7AF9F; --faint:#8C8474;
      --hair:rgba(236,230,217,0.14); --accent:#5AA8B5; --accent-soft:#6FB8C4;
    }
    .hl{ background:linear-gradient(transparent 62%, rgba(90,168,181,0.32) 62%); }
    thead th{ color:#15120D; }
    tbody tr:nth-child(even){ background:rgba(90,168,181,0.10); }
    .tldr{ background:rgba(90,168,181,0.10); border-color:rgba(90,168,181,0.30); }
    .stage,.leg,.aside{ background:rgba(90,168,181,0.06); }
    .stage .num{ color:#15120D; }
    .closing::before{ background:radial-gradient(circle, rgba(90,168,181,0.20) 0%, rgba(90,168,181,0.08) 32%, rgba(26,23,18,0) 68%); }
    .foot a{ color:var(--accent) !important; }
  }
</style>
</head>
<body>

<!-- ============================================================
     ↓↓↓ 你每週只要改這個 <article> 裡面的內容 ↓↓↓
     可用的零件：
       <h2>大標</h2>  <h3>小標</h3>  <p>段落</p>
       <span class="hl">重點底線</span>  <span class="strong">粗體</span>
       <blockquote class="pull"><p>金句</p></blockquote>
       表格 → 複製下面「四、補充」前的 .framework 區塊
     ============================================================ -->
<article class="wrap">
  <div class="topnav"><a href="index.html">← 回目錄</a></div>


  <header class="hero">
    <div class="kicker">知識解碼</div>
    <h1>在這裡放標題</h1>
    <p class="sub">在這裡放副標，<br>第二行可選</p>
  </header>

  <!-- 懶人包（可留可刪） -->
  <div class="tldr">
    <p class="label">三句話看懂</p>
    <p>用三到四句把這篇的重點講完，讓人三秒抓到核心。</p>
  </div>

  <!-- 開場（不用大標的引言段） -->
  <section>
    <p>第一段開場，交代你讀了什麼、為什麼想分享。</p>
  </section>

  <!-- 一個標準段落區塊 -->
  <section>
    <h2>一、第一個重點</h2>
    <h3>小標（可選）</h3>
    <p>內文。需要強調時用 <span class="hl">底線重點</span> 或 <span class="strong">粗體</span>。</p>

    <!-- 金句（可選） -->
    <blockquote class="pull">
      <p>放一句你想讓人記住的話。</p>
    </blockquote>

    <!-- 表格（可選） -->
    <div class="framework">
      <table>
        <thead><tr><th>欄一</th><th>欄二</th></tr></thead>
        <tbody>
          <tr><td>項目 A</td><td>說明。</td></tr>
          <tr><td>項目 B</td><td>說明。</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- 結尾畫龍點睛（知識為主、體悟為輔） -->
  <section>
    <h2>最後，拉遠一點看</h2>
    <p>用一兩句把知識輕輕接回生活或更大的原則，但別喧賓奪主。</p>
  </section>

  <!-- 結尾光暈 -->
  <div class="closing">
    <p class="grace">
      <span class="small">ONE LINE IN ENGLISH</span>
      一句中文收尾。
    </p>
  </div>

  <div class="foot">
    <div class="dot"></div>
    <a href="index.html">← 回目錄</a>　法蘭的學習筆記
  </div>

</article>
<!-- ↑↑↑ 內容到此為止 ↑↑↑ -->

</body>
</html>
